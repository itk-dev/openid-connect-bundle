security:
  providers:
    test_users_1:
      memory:
        users:
          admin: { password: "test", roles: ["ROLE_ADMIN"] }
    test_users_2:
      memory:
        users:
          admin: { password: "test", roles: ["ROLE_ADMIN"] }
